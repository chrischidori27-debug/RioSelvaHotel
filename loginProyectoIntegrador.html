<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Amazon Paradise Resort</title>
    <!-- Bootstrap 5 y Iconos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Animaciones AOS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <!-- Estilos específicos del Login -->
    <link rel="stylesheet" href="css/loginProyectoIntegrador.css">
</head>
<body>
    <div class="overlay"></div>
    <div id="fireflies"></div>

    <!-- BOTÓN VOLVER -->
    <a href="IndexProyectoIntegrador.html   " class="btn-back">
        <i class="bi bi-arrow-left"></i> Volver al Inicio
    </a>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="login-container d-flex justify-content-center align-items-center">
        <div class="login-card" data-aos="zoom-in">
            
            <!-- Encabezado del Formulario -->
            <div class="login-header text-center">
                <img src="image/logo1.png" class="img-fluid" style="max-width: 150px;" alt="Logo"> 
                <h2>Rio Selva</h2>
                <p>Bienvenido de vuelta, ingresa a tu portal exclusivo</p>
            </div>

            <!-- Formulario -->
            <form id="loginForm" class="mt-4">

                <!-- Input de Correo -->
                <div class="input-group-custom mb-3">
                    <label for="email" class="form-label-custom">
                        Correo Electrónico
                    </label>

                    <div class="input-wrapper">
                        <i class="bi bi-envelope icon-input"></i>

                        <input
                            type="email"
                            id="email"
                            placeholder="ejemplo@correo.com"
                            required>
                    </div>
                </div>
                <!-- Input de Contraseña -->
                <div class="input-group-custom mb-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <label for="password" class="form-label-custom">
                            Contraseña
                        </label>
                    </div>
                    <div class="input-wrapper">
                        <i class="bi bi-lock icon-input"></i>
                        <input
                            type="password"
                            id="password"
                            placeholder="••••••••"
                            required>
                    </div>
                </div>
                <!-- Botón -->
                <button
                    type="submit"
                    class="btn btn-resort w-100 py-3">

                    Iniciar Sesión
                    <i class="bi bi-box-arrow-in-right ms-2"></i>
                </button>
            </form>
            <!-- Footer del Card -->
            <div class="login-footer text-center mt-4">
                <p>¿Aún no eres miembro? <a href="RegisterProyectoIntegrador.html" class="register-link">Crea una cuenta</a></p>
            </div>

        </div>
    </div>

    <!-- Bootstrap + Librerías JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="JS/loginJSBootstrap.js"></script>
    <script src="JS/loginLogica.js"></script>
</body>
</html>
