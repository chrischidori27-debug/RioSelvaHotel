<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservar Estadía - Amazon Paradise Resort</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/reservaProyectoIntegrador.css">
</head>
<body>
    <div class="overlay"></div>
    <div id="fireflies"></div>
    <a href="index.html" class="btn-back">
        <i class="bi bi-arrow-left"></i> Volver al Inicio
    </a>
    <div class="booking-container d-flex justify-content-center align-items-center">
        <div class="booking-card" data-aos="zoom-in">
            <div class="booking-header text-center mb-4">
                <div class="booking-logo">🏨</div>
                <h2>Reserva tu Estadía y Estacionamiento</h2>
                <p>Planifica tu aventura y registra tu vehículo de forma integrada en el corazón de la Amazonía</p>
            </div>
            <form id="reservationForm">
                <div class="row g-4">
                    <!-- DATOS DE RESERVA -->
                    <div class="col-lg-6 section-divider-right">
                        <h4 class="section-title">
                            <i class="bi bi-calendar3 me-2"></i>
                            Datos de Estadía
                        </h4>
                        <div class="row g-3">
                            <div class="col-md-6 input-group-custom">
                                <label class="form-label-custom">
                                    Fecha de Entrada
                                </label>
                                <div class="input-wrapper">
                                    <i class="bi bi-calendar-check icon-input"></i>
                                    <input  type="date" id="fecha_entrada" required>
                                </div>
                            </div>
                            <div class="col-md-6 input-group-custom">
                                <label class="form-label-custom">
                                    Fecha de Salida
                                </label>
                                <div class="input-wrapper">
                                    <i class="bi bi-calendar-x icon-input"></i>
                                    <input type="date" id="fecha_salida" required>
                                </div>
                            </div>
                            <!-- HABITACION -->
                            <div class="col-md-12">
                                <label class="form-label-custom mb-3">
                                    Seleccione una Habitación
                                </label>
                                <div id="roomsContainer" class="scroll-box rooms-container">
                                    <div class="text-center text-white">
                                        Cargando habitaciones...
                                    </div>
                                </div>
                                <input type="hidden" id="room_id" name="room_id" required>
                            </div>
                            <!-- PERSONAS -->
                            <div class="col-md-12 input-group-custom">
                                <label class="form-label-custom">
                                    Cantidad de Personas
                                </label>
                                <div class="input-wrapper">
                                    <i class="bi bi-people-fill icon-input"></i>
                                    <input type="number" id="cantidad_personas" min="1" max="20" value="1" required>
                                </div>
                            </div>
                            <!-- METODO DE PAGO -->
                            <div class="col-md-12 input-group-custom">
                                <label class="form-label-custom">
                                    Método de Pago
                                </label>
                                <div class="input-wrapper">
                                    <i class="bi bi-credit-card icon-input"></i>
                                    <select id="metodo_pago" required>
                                        <option value="">Seleccione...</option>
                                        <option value="Efectivo">Efectivo</option>
                                        <option value="Tarjeta">Tarjeta</option>
                                        <option value="Transferencia">Transferencia</option>
                                    </select>
                                </div>
                            </div>

                        </div>
                    </div>
                    <!-- VEHICULO -->
                    <div class="col-lg-6">
                        <h4 class="section-title">
                            <i class="bi bi-calendar3 me-2"></i>
                            Datos Opcionales
                        </h4>
                        <div class="row g-3">
                            <!-- Servicio -->
                            <div class="col-md-12">
                                <label class="form-label-custom mb-2">
                                    Servicios Adicionales
                                </label>

                                <div id="serviciosScroll" class="scroll-box">
                                    <div id="serviciosContainer"></div>
                                </div>
                            </div>
                            <div class="col-md-12 input-group-custom">
                                <label class="form-label-custom">
                                    Marca
                                </label>
                                <div class="input-wrapper">
                                    <i class="bi bi-car-front icon-input"></i>
                                    <input type="text" id="marca">
                                </div>
                            </div>
                            <div class="col-md-12 input-group-custom">
                                <label class="form-label-custom">
                                    Color
                                </label>
                                <div class="input-wrapper">
                                    <i class="bi bi-palette icon-input"></i>
                                    <input type="text" id="color">
                                </div>
                            </div>
                            <div class="col-md-12 input-group-custom">
                                <label class="form-label-custom">
                                    Placa
                                </label>
                                <div class="input-wrapper">
                                    <i class="bi bi-palette icon-input"></i>
                                    <input type="text" id="placa">
                                </div>
                            </div>

                            <!-- PARKING -->
                            <div class="col-md-12 input-group-custom">
                                <label class="form-label-custom">
                                    Estacionamiento
                                </label>
                                <div class="input-wrapper">
                                    <i class="bi bi-p-circle icon-input"></i>
                                    <select id="parking_id">
                                        <option value="">
                                            Sin estacionamiento
                                        </option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-12 mt-4">
                        <button type="submit" class="btn btn-resort w-100 py-3">
                            Confirmar Reserva
                            <i class="bi bi-check2-circle ms-2"></i>
                        </button>
                       <!--  <button type="submit" id="crear">
                            crear VEHICULO
                        </button> -->
                    </div>
                </div>
            </form> 
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="JS/reservaBootstrap.js"></script>
    <script src="Js/reservaLogica.js"></script>
<!--     <script src="Js/pruebas.js"></script>
 -->
</body>
</html>
